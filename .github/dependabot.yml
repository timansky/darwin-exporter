---
version: 2
updates:
- package-ecosystem: "gomod"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "04:00"
    timezone: "Asia/Almaty"
  open-pull-requests-limit: 10
  commit-message:
    prefix: "deps"
  labels:
  - "dependencies"
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "04:15"
    timezone: "Asia/Almaty"
  open-pull-requests-limit: 10
  commit-message:
    prefix: "ci"
  labels:
  - "dependencies"
