---
name: Branch

'on':
  push:
    branches:
    - main
    tags-ignore:
    - "v*"
    paths-ignore:
    - "VERSION"
    - ".github/workflows/**"
  pull_request:
    branches:
    - main
    paths-ignore:
    - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Markdown lint
      uses: DavidAnson/markdownlint-cli2-action@v20
      with:
        globs: |
          **/*.md
          !**/vendor/**

    - name: Display Go version
      run: go version

    - name: Test
      run: go test ./...

    - name: Vet
      run: go vet ./...

    - name: Resolve dev version
      id: dev_version
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      shell: bash
      run: |
        set -euo pipefail

        if [ ! -f VERSION ]; then
          echo "VERSION file is required"
          exit 1
        fi

        VERSION_RAW="$(tr -d '\n' < VERSION)"
        VERSION_RAW="${VERSION_RAW#v}"
        VERSION_BASE="${VERSION_RAW%-beta}"
        VERSION_BASE="${VERSION_BASE%-dev}"

        if [[ ! "${VERSION_BASE}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          echo "VERSION must be semver (example: 1.2.3 or 1.2.3-beta). Got: ${VERSION_RAW}"
          exit 1
        fi

        MAJOR="${BASH_REMATCH[1]}"
        MINOR="${BASH_REMATCH[2]}"
        PATCH="${BASH_REMATCH[3]}"
        NEXT_PATCH=$((PATCH + 1))

        DEV_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}-dev"
        echo "version=${DEV_VERSION}" >> "${GITHUB_OUTPUT}"

    - name: Build (cgo)
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      env:
        CGO_ENABLED: "1"
      run: |
        set -euo pipefail
        VERSION="${{ steps.dev_version.outputs.version }}"
        COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-X github.com/timansky/darwin-exporter/version.Version=${VERSION} \
        -X github.com/timansky/darwin-exporter/version.Commit=${COMMIT} \
        -X github.com/timansky/darwin-exporter/version.BuildDate=${BUILD_DATE}"
        go build -tags cgo -ldflags "${LDFLAGS}" -o darwin-exporter .

    - name: Package CI artifacts
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ steps.dev_version.outputs.version }}"
        GOARCH=$(go env GOARCH)

        BIN_OUT="darwin-exporter_${VERSION}_darwin_${GOARCH}"
        cp darwin-exporter "${BIN_OUT}"
        tar -czf "${BIN_OUT}.tar.gz" "${BIN_OUT}" LICENSE README.md
        shasum -a 256 "${BIN_OUT}.tar.gz" > "${BIN_OUT}.sha256"

        DASH_OUT="darwin-exporter_dashboard_${VERSION}.json"
        cp docs/grafana/dashboard.json "${DASH_OUT}"
        shasum -a 256 "${DASH_OUT}" > "${DASH_OUT}.sha256"

    - name: Upload CI artifacts
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      uses: actions/upload-artifact@v6
      with:
        name: ci-${{ github.event_name }}-${{ github.run_number }}
        retention-days: 14
        path: |
          darwin-exporter_*.tar.gz
          darwin-exporter_*.sha256
          darwin-exporter_dashboard_*.json
          darwin-exporter_dashboard_*.json.sha256

  prerelease:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
    - build-and-test
    permissions:
      contents: write
    uses: ./.github/workflows/prerelease.yml

  prerelease-build:
    if: ${{ needs.prerelease.outputs.tag != '' }}
    needs:
    - prerelease
    name: Build prerelease ${{ matrix.goarch }}
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.prerelease.outputs.tag }}
      RELEASE_VERSION: ${{ replace(needs.prerelease.outputs.tag, '-beta', '') }}
    strategy:
      fail-fast: false
      matrix:
        goarch:
        - amd64
        - arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Build archive
      env:
        CGO_ENABLED: "1"
        GOOS: darwin
        GOARCH: ${{ matrix.goarch }}
      run: |
        COMMIT="${GITHUB_SHA::7}"
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-X github.com/timansky/darwin-exporter/version.Version=${RELEASE_VERSION} \
        -X github.com/timansky/darwin-exporter/version.Commit=${COMMIT} \
        -X github.com/timansky/darwin-exporter/version.BuildDate=${BUILD_DATE} -s -w"

        OUT="darwin-exporter_${RELEASE_VERSION}_darwin_${GOARCH}"
        go build -tags cgo -ldflags "${LDFLAGS}" -o "${OUT}" .

        tar -czf "${OUT}.tar.gz" "${OUT}" LICENSE README.md
        shasum -a 256 "${OUT}.tar.gz" > "${OUT}.sha256"

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: prerelease-${{ matrix.goarch }}
        path: |
          darwin-exporter_${{ env.RELEASE_VERSION }}_darwin_${{ matrix.goarch }}.tar.gz
          darwin-exporter_${{ env.RELEASE_VERSION }}_darwin_${{ matrix.goarch }}.sha256

  prerelease-dashboard:
    if: ${{ needs.prerelease.outputs.tag != '' }}
    needs:
    - prerelease
    name: Build prerelease dashboard artifact
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prerelease.outputs.tag }}
      RELEASE_VERSION: ${{ replace(needs.prerelease.outputs.tag, '-beta', '') }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Build versioned dashboard artifact
      run: |
        set -euo pipefail
        OUT="darwin-exporter_dashboard_${RELEASE_VERSION}.json"
        jq --arg tag "${RELEASE_VERSION}" '
          .id = null
          | .description = ((.description // "") | gsub(" \\| release [^|]+$"; "") + " | release " + $tag)
          | .tags = (((.tags // []) | map(select(startswith("release:") | not))) + ["release:" + $tag])
        ' docs/grafana/dashboard.json > "${OUT}"
        shasum -a 256 "${OUT}" > "${OUT}.sha256"

    - name: Upload dashboard artifact
      uses: actions/upload-artifact@v6
      with:
        name: prerelease-dashboard
        path: |
          darwin-exporter_dashboard_${{ env.RELEASE_VERSION }}.json
          darwin-exporter_dashboard_${{ env.RELEASE_VERSION }}.json.sha256

  prerelease-publish:
    if: ${{ needs.prerelease.outputs.tag != '' }}
    needs:
    - prerelease
    - prerelease-build
    - prerelease-dashboard
    name: Publish GitHub Prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prerelease.outputs.tag }}

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        pattern: prerelease-*
        merge-multiple: true
        path: dist

    - name: Create checksums bundle
      shell: bash
      run: |
        set -euo pipefail
        cat dist/*.sha256 > dist/sha256sums.txt

    - name: Publish prerelease
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: true
        generate_release_notes: true
        overwrite_files: true
        fail_on_unmatched_files: true
        files: |
          dist/*.tar.gz
          dist/darwin-exporter_dashboard_*.json
          dist/sha256sums.txt
