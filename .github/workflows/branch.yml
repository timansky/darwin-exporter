---
name: Branch

'on':
  push:
    branches:
    - main
    tags-ignore:
    - "v*"
    paths-ignore:
    - "VERSION"
    - ".github/workflows/**"
  pull_request:
    branches:
    - main
    paths-ignore:
    - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Markdown lint
      uses: DavidAnson/markdownlint-cli2-action@v20
      with:
        globs: |
          **/*.md
          !**/vendor/**

    - name: Display Go version
      run: go version

    - name: Test
      run: go test ./...

    - name: Vet
      run: go vet ./...

    - name: Resolve dev version
      id: dev_version
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      shell: bash
      run: |
        set -euo pipefail

        SOURCE_VERSION="$(
          sed -nE 's/^[[:space:]]*Version[[:space:]]*=[[:space:]]*"([^"]+)".*$/\1/p' version/version.go \
          | head -1
        )"
        SOURCE_VERSION="${SOURCE_VERSION#v}"

        if [[ "${SOURCE_VERSION}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-dev$ ]]; then
          DEV_VERSION="v${BASH_REMATCH[1]}-dev"
        elif [[ "${SOURCE_VERSION}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
          DEV_VERSION="v${BASH_REMATCH[1]}-dev"
        elif [[ -z "${SOURCE_VERSION}" || "${SOURCE_VERSION}" == "dev" ]]; then
          LAST_STABLE_TAG="$(
            git tag -l 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 \
            || true
          )"
          if [ -n "${LAST_STABLE_TAG}" ]; then
            STABLE_VERSION="${LAST_STABLE_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${STABLE_VERSION}"
            DEV_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))-dev"
          else
            DEV_VERSION="v1.0.0-dev"
          fi
        else
          echo "version/version.go Version must be semver or semver-dev (ex: v1.0.2|v1.0.2-dev). Got: ${SOURCE_VERSION}"
          exit 1
        fi

        echo "version=${DEV_VERSION}" >> "${GITHUB_OUTPUT}"

    - name: Build (cgo)
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      env:
        CGO_ENABLED: "1"
      run: |
        set -euo pipefail
        VERSION="${{ steps.dev_version.outputs.version }}"
        COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-X github.com/timansky/darwin-exporter/version.Version=${VERSION} \
        -X github.com/timansky/darwin-exporter/version.Commit=${COMMIT} \
        -X github.com/timansky/darwin-exporter/version.BuildDate=${BUILD_DATE}"
        go build -tags cgo -ldflags "${LDFLAGS}" -o darwin-exporter .

    - name: Package CI artifacts
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ steps.dev_version.outputs.version }}"
        GOARCH=$(go env GOARCH)

        BIN_OUT="darwin-exporter_${VERSION}_darwin_${GOARCH}"
        cp darwin-exporter "${BIN_OUT}"
        tar -czf "${BIN_OUT}.tar.gz" "${BIN_OUT}" LICENSE README.md

        DASH_OUT="darwin-exporter_dashboard_${VERSION}.json"
        cp docs/grafana/dashboard.json "${DASH_OUT}"

        # GNU-compatible checksum manifest: "<sha256><two spaces><filename>".
        mapfile -t checksum_files < <(printf '%s\n' "${BIN_OUT}.tar.gz" "${DASH_OUT}" | LC_ALL=C sort)
        : > SHA256SUMS
        for f in "${checksum_files[@]}"; do
          shasum -a 256 "${f}" >> SHA256SUMS
        done

    - name: Upload CI artifacts
      if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
      uses: actions/upload-artifact@v6
      with:
        name: ci-${{ github.event_name }}-${{ github.run_number }}
        retention-days: 14
        path: |
          darwin-exporter_*.tar.gz
          darwin-exporter_dashboard_*.json
          SHA256SUMS

  prerelease:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') }}
    needs:
    - build-and-test
    permissions:
      contents: write
    uses: ./.github/workflows/prerelease.yml

  prerelease-build:
    if: ${{ needs.prerelease.outputs.tag != '' }}
    needs:
    - prerelease
    name: Build prerelease ${{ matrix.goarch }}
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.prerelease.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prerelease.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        goarch:
        - amd64
        - arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Build archive
      env:
        CGO_ENABLED: "1"
        GOOS: darwin
        GOARCH: ${{ matrix.goarch }}
      run: |
        COMMIT="$(git rev-parse --short HEAD)"
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-X github.com/timansky/darwin-exporter/version.Commit=${COMMIT} \
        -X github.com/timansky/darwin-exporter/version.BuildDate=${BUILD_DATE} -s -w"

        OUT="darwin-exporter_${RELEASE_VERSION}_darwin_${GOARCH}"
        go build -tags cgo -ldflags "${LDFLAGS}" -o "${OUT}" .

        tar -czf "${OUT}.tar.gz" "${OUT}" LICENSE README.md

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: prerelease-${{ matrix.goarch }}
        path: |
          darwin-exporter_${{ env.RELEASE_VERSION }}_darwin_${{ matrix.goarch }}.tar.gz

  prerelease-dashboard:
    if: ${{ needs.prerelease.outputs.tag != '' }}
    needs:
    - prerelease
    name: Build prerelease dashboard artifact
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prerelease.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prerelease.outputs.version }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Build versioned dashboard artifact
      run: |
        set -euo pipefail
        OUT="darwin-exporter_dashboard_${RELEASE_VERSION}.json"
        jq --arg tag "${RELEASE_VERSION}" '
          .id = null
          | .description = ((.description // "") | gsub(" \\| release [^|]+$"; "") + " | release " + $tag)
          | .tags = (((.tags // []) | map(select(startswith("release:") | not))) + ["release:" + $tag])
        ' docs/grafana/dashboard.json > "${OUT}"

    - name: Upload dashboard artifact
      uses: actions/upload-artifact@v6
      with:
        name: prerelease-dashboard
        path: |
          darwin-exporter_dashboard_${{ env.RELEASE_VERSION }}.json

  prerelease-publish:
    if: ${{ needs.prerelease.outputs.tag != '' }}
    needs:
    - prerelease
    - prerelease-build
    - prerelease-dashboard
    name: Publish GitHub Prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prerelease.outputs.tag }}

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        pattern: prerelease-*
        merge-multiple: true
        path: dist

    - name: Generate SHA256SUMS
      shell: bash
      run: |
        set -euo pipefail
        cd dist
        shopt -s nullglob
        files=(darwin-exporter_*.tar.gz darwin-exporter_dashboard_*.json)
        if [ "${#files[@]}" -eq 0 ]; then
          echo "No release files found to hash"
          exit 1
        fi
        mapfile -t checksum_files < <(printf '%s\n' "${files[@]}" | LC_ALL=C sort)
        : > SHA256SUMS
        for f in "${checksum_files[@]}"; do
          shasum -a 256 "${f}" >> SHA256SUMS
        done

    - name: Publish prerelease
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: true
        generate_release_notes: true
        overwrite_files: true
        fail_on_unmatched_files: true
        files: |
          dist/*.tar.gz
          dist/darwin-exporter_dashboard_*.json
          dist/SHA256SUMS

  prerelease-push-main:
    if: ${{ needs.prerelease.outputs.tag != '' && needs.prerelease.outputs.commit_created == 'true' }}
    needs:
    - prerelease
    - prerelease-publish
    name: Push release commit to main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout main
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Push prepared release commit
      shell: bash
      run: |
        set -euo pipefail

        TARGET_SHA="${{ needs.prerelease.outputs.commit_sha }}"
        if [ -z "${TARGET_SHA}" ]; then
          echo "Empty commit sha from prerelease workflow"
          exit 1
        fi

        git fetch origin main --force
        git fetch --tags --force origin

        if ! git cat-file -e "${TARGET_SHA}^{commit}" 2>/dev/null; then
          echo "Release commit ${TARGET_SHA} is not available locally"
          exit 1
        fi

        if git merge-base --is-ancestor "${TARGET_SHA}" "origin/main"; then
          echo "Release commit already present in main: ${TARGET_SHA}"
          exit 0
        fi

        if ! git merge-base --is-ancestor "origin/main" "${TARGET_SHA}"; then
          echo "Release commit ${TARGET_SHA} is not a fast-forward from origin/main"
          echo "Main advanced concurrently. Re-run workflow."
          exit 1
        fi

        git push origin "${TARGET_SHA}:refs/heads/main"
