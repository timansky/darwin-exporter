---
name: Release

run-name: release-${{ github.event.inputs.tag || github.ref_name }}

'on':
  workflow_dispatch:
    inputs:
      tag:
        description: "Prerelease tag to promote (for example: v1.2.3-beta)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      INPUT_TAG: ${{ github.event.inputs.tag || '' }}

    steps:
    - name: Checkout repo for tag lookup
      uses: actions/checkout@v6
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0

    - name: Resolve prerelease tag
      id: tags
      shell: bash
      run: |
        set -euo pipefail

        TAG="${INPUT_TAG}"
        SHOULD_PROMOTE="true"
        if [ -z "${TAG}" ]; then
          git fetch --tags --prune
          while IFS= read -r CANDIDATE; do
            [ -n "${CANDIDATE}" ] || continue
            STABLE_CANDIDATE="${CANDIDATE%-beta}"
            if ! git ls-remote --exit-code --tags origin "refs/tags/${STABLE_CANDIDATE}" >/dev/null 2>&1; then
              TAG="${CANDIDATE}"
              break
            fi
          done < <(git tag --list 'v*-beta' --sort=-v:refname)
        fi

        if [ -z "${TAG}" ]; then
          echo "No promotable prerelease tag found. All beta tags already have matching stable tags."
          echo "Workflow finished with skip."
          echo "should_promote=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta$ ]]; then
          echo "Invalid prerelease tag: ${TAG}"
          exit 1
        fi

        STABLE_TAG="${TAG%-beta}"
        MAJOR_TAG="v$(echo "${STABLE_TAG#v}" | cut -d. -f1)"

        echo "should_promote=${SHOULD_PROMOTE}" >> "${GITHUB_OUTPUT}"
        echo "beta=${TAG}" >> "${GITHUB_OUTPUT}"
        echo "stable=${STABLE_TAG}" >> "${GITHUB_OUTPUT}"
        echo "major=${MAJOR_TAG}" >> "${GITHUB_OUTPUT}"

    - name: Checkout prerelease tag
      if: ${{ steps.tags.outputs.should_promote == 'true' }}
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.tags.outputs.beta }}
        fetch-depth: 0

    - name: Create and push stable tags
      if: ${{ steps.tags.outputs.should_promote == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        STABLE_TAG="${{ steps.tags.outputs.stable }}"
        MAJOR_TAG="${{ steps.tags.outputs.major }}"

        if git ls-remote --exit-code --tags origin "refs/tags/${STABLE_TAG}" >/dev/null 2>&1; then
          echo "Stable tag already exists on remote: ${STABLE_TAG}"
        else
          git tag "${STABLE_TAG}"
          git push origin "${STABLE_TAG}"
          echo "Created stable tag: ${STABLE_TAG}"
        fi

        git tag -f "${MAJOR_TAG}"
        git push origin ":refs/tags/${MAJOR_TAG}" || true
        git push origin "${MAJOR_TAG}"
        echo "Updated major tag: ${MAJOR_TAG}"

    - name: Download prerelease release artifacts
      if: ${{ steps.tags.outputs.should_promote == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        rm -rf dist
        mkdir -p dist
        gh release download "${{ steps.tags.outputs.beta }}" --dir dist

    - name: Publish stable release from prerelease artifacts
      if: ${{ steps.tags.outputs.should_promote == 'true' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tags.outputs.stable }}
        draft: false
        prerelease: false
        generate_release_notes: true
        overwrite_files: true
        fail_on_unmatched_files: true
        files: |
          dist/*
