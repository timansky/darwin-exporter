---
name: Release Build

run-name: release-${{ github.event.inputs.tag }}

# References:
# - https://docs.github.com/en/actions/tutorials/build-and-test-code/go
# - https://docs.github.com/en/actions/tutorials/build-and-test-code/rust
# - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

'on':
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag (for example: v1.2.3 or v1.2.3-beta)"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event.inputs.tag }}

jobs:
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
        - amd64
        - arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Build archive
      env:
        CGO_ENABLED: "1"
        GOOS: darwin
        GOARCH: ${{ matrix.goarch }}
      run: |
        COMMIT="${GITHUB_SHA::7}"
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-X github.com/timansky/darwin-exporter/version.Version=${RELEASE_TAG} \
        -X github.com/timansky/darwin-exporter/version.Commit=${COMMIT} \
        -X github.com/timansky/darwin-exporter/version.BuildDate=${BUILD_DATE} -s -w"

        OUT="darwin-exporter_${RELEASE_TAG}_darwin_${GOARCH}"
        go build -tags cgo -ldflags "${LDFLAGS}" -o "${OUT}" .

        tar -czf "${OUT}.tar.gz" "${OUT}" LICENSE README.md
        shasum -a 256 "${OUT}.tar.gz" > "${OUT}.sha256"

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: release-${{ matrix.goarch }}
        path: |
          darwin-exporter_${{ env.RELEASE_TAG }}_darwin_${{ matrix.goarch }}.tar.gz
          darwin-exporter_${{ env.RELEASE_TAG }}_darwin_${{ matrix.goarch }}.sha256

  dashboard:
    name: Build dashboard artifact
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Build versioned dashboard artifact
      run: |
        set -euo pipefail
        OUT="darwin-exporter_dashboard_${RELEASE_TAG}.json"
        jq --arg tag "${RELEASE_TAG}" '
          .id = null
          | .description = ((.description // "") | gsub(" \\| release [^|]+$"; "") + " | release " + $tag)
          | .tags = (((.tags // []) | map(select(startswith("release:") | not))) + ["release:" + $tag])
        ' docs/grafana/dashboard.json > "${OUT}"
        shasum -a 256 "${OUT}" > "${OUT}.sha256"

    - name: Upload dashboard artifact
      uses: actions/upload-artifact@v6
      with:
        name: release-dashboard
        path: |
          darwin-exporter_dashboard_${{ env.RELEASE_TAG }}.json
          darwin-exporter_dashboard_${{ env.RELEASE_TAG }}.json.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
    - build
    - dashboard
    permissions:
      contents: write

    steps:
    - name: Checkout tag for release operations
      uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        pattern: release-*
        merge-multiple: true
        path: dist

    - name: Create checksums bundle
      run: |
        set -euo pipefail
        mkdir -p dist
        shopt -s nullglob
        CHECKSUM_FILES=(dist/*.sha256)
        if (( ${#CHECKSUM_FILES[@]} == 0 )); then
          echo "No checksum files found in dist/. Build artifacts were not downloaded."
          ls -la dist || true
          exit 1
        fi
        cat "${CHECKSUM_FILES[@]}" > dist/sha256sums.txt

    - name: Publish release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        shopt -s nullglob
        TAR_FILES=(dist/*.tar.gz)
        DASHBOARD_FILES=(dist/darwin-exporter_dashboard_*.json)
        if (( ${#TAR_FILES[@]} == 0 )); then
          echo "No release archives found in dist/. Build artifacts were not downloaded."
          ls -la dist || true
          exit 1
        fi
        if (( ${#DASHBOARD_FILES[@]} == 0 )); then
          echo "No dashboard artifacts found in dist/. Dashboard artifact was not downloaded."
          ls -la dist || true
          exit 1
        fi

        IS_PRERELEASE=false
        if [[ "${RELEASE_TAG}" == *-beta ]]; then
          IS_PRERELEASE=true
        fi

        if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
          RELEASE_ID="$(gh api "repos/${GH_REPO}/releases/tags/${RELEASE_TAG}" --jq '.id')"
          PATCH_PAYLOAD="$(jq -n --argjson prerelease "${IS_PRERELEASE}" '{draft: false, prerelease: $prerelease}')"
          gh api \
            --method PATCH \
            "repos/${GH_REPO}/releases/${RELEASE_ID}" \
            --input - <<< "${PATCH_PAYLOAD}" >/dev/null

          gh release upload "${RELEASE_TAG}" \
            "${TAR_FILES[@]}" \
            "${DASHBOARD_FILES[@]}" \
            dist/sha256sums.txt#sha256sums.txt \
            --clobber
          exit 0
        fi

        EXTRA_ARGS=()
        if [[ "${IS_PRERELEASE}" == "true" ]]; then
          EXTRA_ARGS+=(--prerelease)
        fi

        gh release create "${RELEASE_TAG}" \
          --verify-tag \
          --generate-notes \
          "${EXTRA_ARGS[@]}" \
          "${TAR_FILES[@]}" \
          "${DASHBOARD_FILES[@]}" \
          dist/sha256sums.txt#sha256sums.txt
