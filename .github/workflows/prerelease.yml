---
name: Prerelease

run-name: prerelease-${{ github.ref_name }}-${{ github.run_number }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

'on':
  workflow_call:
    outputs:
      version:
        description: "Generated prerelease base version"
        value: ${{ jobs.prerelease.outputs.version }}
      tag:
        description: "Generated prerelease tag"
        value: ${{ jobs.prerelease.outputs.tag }}
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Resolve prerelease tag from VERSION
      id: version
      shell: bash
      run: |
        set -euo pipefail

        if [ ! -f VERSION ]; then
          echo "VERSION file is required"
          exit 1
        fi

        VERSION_RAW="$(tr -d '\n' < VERSION)"
        VERSION_RAW="${VERSION_RAW#v}"
        VERSION="${VERSION_RAW%-beta}"

        if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "VERSION must be semver (example: 1.2.3 or 1.2.3-beta). Got: ${VERSION_RAW}"
          exit 1
        fi

        echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
        echo "tag=v${VERSION}-beta" >> "${GITHUB_OUTPUT}"

    - name: Push prerelease tag
      shell: bash
      run: |
        set -euo pipefail

        git tag -f "${{ steps.version.outputs.tag }}"
        git push origin ":refs/tags/${{ steps.version.outputs.tag }}" || true
        git push origin "${{ steps.version.outputs.tag }}"
