---
name: Promote Release

run-name: promote-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

# References:
# - https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/trigger-a-workflow
# - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

'on':
  push:
    tags:
    - "v*-beta"
  workflow_dispatch:
    inputs:
      tag:
        description: "Prerelease tag to promote (for example: v1.2.3-beta)"
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
      EVENT_NAME: ${{ github.event_name }}
      REF_NAME: ${{ github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
    - name: Checkout repo for tag lookup
      uses: actions/checkout@v6
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0

    - name: Resolve prerelease tag
      id: tags
      shell: bash
      run: |
        set -euo pipefail

        TAG="${INPUT_TAG}"
        if [ -z "${TAG}" ]; then
          if [ "${EVENT_NAME}" = "push" ]; then
            TAG="${REF_NAME}"
          else
            git fetch --tags --prune
            TAG="$(git tag --list 'v*-beta' --sort=-v:refname | head -n1)"
          fi
        fi

        if [ -z "${TAG}" ]; then
          echo "No prerelease tag provided or found"
          exit 1
        fi

        if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta$ ]]; then
          echo "Invalid prerelease tag: ${TAG}"
          exit 1
        fi

        STABLE_TAG="${TAG%-beta}"
        MAJOR_TAG="v$(echo "${STABLE_TAG#v}" | cut -d. -f1)"

        echo "beta=${TAG}" >> "${GITHUB_OUTPUT}"
        echo "stable=${STABLE_TAG}" >> "${GITHUB_OUTPUT}"
        echo "major=${MAJOR_TAG}" >> "${GITHUB_OUTPUT}"

    - name: Checkout prerelease tag
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.tags.outputs.beta }}
        fetch-depth: 0

    - name: Create and push stable tags
      shell: bash
      run: |
        set -euo pipefail

        STABLE_TAG="${{ steps.tags.outputs.stable }}"
        MAJOR_TAG="${{ steps.tags.outputs.major }}"

        if git ls-remote --exit-code --tags origin "refs/tags/${STABLE_TAG}" >/dev/null 2>&1; then
          echo "Stable tag already exists on remote: ${STABLE_TAG}"
        else
          git tag "${STABLE_TAG}"
          git push origin "${STABLE_TAG}"
          echo "Created stable tag: ${STABLE_TAG}"
        fi

        git tag -f "${MAJOR_TAG}"
        git push origin ":refs/tags/${MAJOR_TAG}" || true
        git push origin "${MAJOR_TAG}"
        echo "Updated major tag: ${MAJOR_TAG}"

    - name: Trigger release workflow for stable tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        STABLE_TAG="${{ steps.tags.outputs.stable }}"
        TARGET_REF="${DEFAULT_BRANCH:-main}"
        gh workflow run release.yml \
          --ref "${TARGET_REF}" \
          -f tag="${STABLE_TAG}"
        echo "Triggered release workflow for ${STABLE_TAG} on ref ${TARGET_REF}"
