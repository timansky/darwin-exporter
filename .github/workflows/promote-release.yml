---
name: Promote Release

run-name: promote-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

# References:
# - https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/trigger-a-workflow
# - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

'on':
  push:
    tags:
    - "v*-beta"
  workflow_dispatch:
    inputs:
      tag:
        description: "Prerelease tag to promote (for example: v1.2.3-beta)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      BETA_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
    - name: Resolve prerelease tag
      id: tags
      shell: bash
      run: |
        set -euo pipefail

        TAG="${BETA_TAG}"
        if [ -z "${TAG}" ]; then
          echo "No prerelease tag provided"
          exit 1
        fi

        if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta$ ]]; then
          echo "Invalid prerelease tag: ${TAG}"
          exit 1
        fi

        STABLE_TAG="${TAG%-beta}"
        MAJOR_TAG="v$(echo "${STABLE_TAG#v}" | cut -d. -f1)"

        echo "beta=${TAG}" >> "${GITHUB_OUTPUT}"
        echo "stable=${STABLE_TAG}" >> "${GITHUB_OUTPUT}"
        echo "major=${MAJOR_TAG}" >> "${GITHUB_OUTPUT}"

    - name: Checkout prerelease tag
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.tags.outputs.beta }}
        fetch-depth: 0

    - name: Create and push stable tags
      shell: bash
      run: |
        set -euo pipefail

        STABLE_TAG="${{ steps.tags.outputs.stable }}"
        MAJOR_TAG="${{ steps.tags.outputs.major }}"

        if git ls-remote --exit-code --tags origin "refs/tags/${STABLE_TAG}" >/dev/null 2>&1; then
          echo "Stable tag already exists on remote: ${STABLE_TAG}"
        else
          git tag "${STABLE_TAG}"
          git push origin "${STABLE_TAG}"
          echo "Created stable tag: ${STABLE_TAG}"
        fi

        git tag -f "${MAJOR_TAG}"
        git push origin ":refs/tags/${MAJOR_TAG}" || true
        git push origin "${MAJOR_TAG}"
        echo "Updated major tag: ${MAJOR_TAG}"
